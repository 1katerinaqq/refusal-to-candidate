<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Шаблоны отказов — Золотое Яблоко</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap');

:root{
  --ink:#16231A;
  --ink-soft:#4B5F44;
  --paper:#B4E600;
  --paper-alt:#C9F23D;
  --card:#FFFFFF;
  --highlighter:#16231A;
  --highlighter-soft:#EFFAB4;
  --line:#A3CC00;
  --green:#5C8A2E;
  --red:#B5533C;
  --on-lime:#FFFFFF;
}

*{box-sizing:border-box;}
body{
  margin:0;
  background:var(--paper);
  color:var(--ink);
  font-family:'IBM Plex Sans',sans-serif;
  font-size:14px;
  line-height:1.5;
}

.app{max-width:1180px;margin:0 auto;padding:28px 24px 60px;}

/* Header */
.header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  border-bottom:2px solid var(--on-lime);
  padding-bottom:16px;
  margin-bottom:22px;
}
.header-left{display:flex;align-items:center;gap:12px;}
.logo{width:40px;height:40px;flex-shrink:0;border-radius:8px;object-fit:cover;}
.header h1{
  font-family:'IBM Plex Mono',monospace;
  font-size:20px;
  font-weight:700;
  letter-spacing:-0.01em;
  margin:0;
  color:var(--on-lime);
}
.header .brand{font-size:11px;color:var(--on-lime);opacity:.85;text-transform:uppercase;letter-spacing:.08em;margin-top:2px;}
.header h1 span{color:var(--paper);background:var(--on-lime);padding:1px 6px;border-radius:2px;}
.header .meta{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--on-lime);opacity:.85;text-transform:uppercase;letter-spacing:.06em;}

.panel{
  border:1px solid var(--line);
  background:var(--card);
  border-radius:8px;
  padding:22px;
}

/* Layout for single mode */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;}
@media (max-width:860px){.grid{grid-template-columns:1fr;}}

.field-group{margin-bottom:14px;}
label{
  display:block;
  font-family:'IBM Plex Mono',monospace;
  font-size:11px;
  text-transform:uppercase;
  letter-spacing:.05em;
  color:var(--ink-soft);
  margin-bottom:5px;
}
input, select, textarea{
  width:100%;
  padding:9px 11px;
  border:1px solid var(--line);
  border-radius:5px;
  background:var(--paper);
  color:var(--ink);
  font-family:'IBM Plex Sans',sans-serif;
  font-size:13.5px;
}
input:focus, select:focus, textarea:focus{
  outline:none;
  border-color:var(--ink);
  background:var(--card);
}
textarea{resize:vertical;font-family:'IBM Plex Mono',monospace;font-size:12.5px;line-height:1.6;}

.template-select{margin-bottom:16px;}
.tmpl-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.tmpl-btn{
  font-family:'IBM Plex Mono',monospace;
  font-size:11.5px;
  padding:6px 12px;
  border:1px solid var(--line);
  border-radius:14px;
  background:var(--paper-alt);
  cursor:pointer;
  color:var(--ink-soft);
}
.tmpl-btn.active{background:var(--ink);color:var(--paper);border-color:var(--ink);}

.hint{font-size:11.5px;color:var(--ink-soft);margin-top:4px;}
.hint b{color:var(--ink);}

/* Preview card */
.preview-label{
  font-family:'IBM Plex Mono',monospace;
  font-size:11px;
  text-transform:uppercase;
  letter-spacing:.05em;
  color:var(--ink-soft);
  margin-bottom:8px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.preview-box{
  background:var(--paper-alt);
  border:1px dashed var(--line);
  border-radius:6px;
  padding:18px;
  min-height:180px;
  white-space:pre-wrap;
  font-size:13.5px;
  line-height:1.65;
}
.missing{background:var(--highlighter-soft);color:var(--red);padding:0 3px;border-radius:2px;font-weight:600;}

.copy-btn{
  font-family:'IBM Plex Mono',monospace;
  font-size:11.5px;
  padding:6px 14px;
  background:var(--ink);
  color:var(--paper);
  border:none;
  border-radius:5px;
  cursor:pointer;
}
.copy-btn:hover{background:var(--green);}
.copy-btn.small{padding:4px 10px;}
</style>
</head>

Благодарю за открытую, конструктивную беседу во время интервью! Мы очень ценим ваше время и готовность к сотрудничеству. На данный момент мы не готовы предложить организацию последующих взаимодействий в рамках вакансии, поскольку все же ищем кандидата, чей опыт и умения будут более точно соответствовать нашим ожиданиям и требованиям под текущие проекты и масштабы.{{details}} Мне было искренне приятно познакомиться с вами, благодарю за встречу и интерес к нашей компании!

{{name}}, предлагаю нам оставаться на связи на случай каких-либо изменений с нашей или вашей стороны. Мы также всегда рады рекомендациям. Желаю удачи и успехов в поисках!

{{sourcer}}`
  }
};

let currentTemplateKey = 'rejection';
let templates = JSON.parse(JSON.stringify(DEFAULT_TEMPLATES));

// storage
async function loadTemplates(){
  try{
    const res = await window.storage.get('custom-templates');
    if(res && res.value){
      const saved = JSON.parse(res.value);
      Object.keys(saved).forEach(k=>{ if(templates[k]) templates[k].text = saved[k]; });
    }
  }catch(e){ /* no saved data yet */ }
}
async function saveTemplateText(key, text){
  templates[key].text = text;
  try{
    const res = await window.storage.get('custom-templates');
    const saved = res && res.value ? JSON.parse(res.value) : {};
    saved[key] = text;
    await window.storage.set('custom-templates', JSON.stringify(saved));
  }catch(e){ console.error('storage error', e); }
}

function renderTmplButtons(containerId, activeKey, onSelect){
  const c = document.getElementById(containerId);
  c.innerHTML = '';
  Object.keys(templates).forEach(key=>{
    const b = document.createElement('div');
    b.className = 'tmpl-btn' + (key===activeKey ? ' active' : '');
    b.textContent = templates[key].label;
    b.onclick = ()=> onSelect(key);
    c.appendChild(b);
  });
}

const OPTIONAL_VARS = ['details'];
function fillVar(text, vars){
  return text.replace(/\{\{(\w+)\}\}/g, (m, k)=>{
    if(vars[k] && vars[k].trim()) return vars[k].trim();
    if(OPTIONAL_VARS.includes(k)) return '';
    return `<span class="missing">{{${k}}}</span>`;
  });
}
function fillVarPlain(text, vars){
  return text.replace(/\{\{(\w+)\}\}/g, (m, k)=>{
    if(vars[k] && vars[k].trim()) return vars[k].trim();
    if(OPTIONAL_VARS.includes(k)) return '';
    return `[${k}?]`;
  });
}

// SINGLE MODE
function selectTemplateSingle(key){
  currentTemplateKey = key;
  document.getElementById('tmplText').value = templates[key].text;
  renderTmplButtons('tmplButtons', key, selectTemplateSingle);
  updatePreview();
}
function getVars(){
  return {
    name: document.getElementById('v_name').value,
    role: document.getElementById('v_role').value,
    company: document.getElementById('v_company').value,
    sourcer: document.getElementById('v_sourcer').value,
    details: document.getElementById('v_details').value
  };
}
function updatePreview(){
  const text = document.getElementById('tmplText').value;
  document.getElementById('previewBox').innerHTML = fillVar(text, getVars());
}
function copySingle(){
  const text = fillVarPlain(document.getElementById('tmplText').value, getVars());
  navigator.clipboard.writeText(text);
  flashStatus('previewBox');
}
function flashStatus(id){
  const el = document.getElementById(id);
  const old = el.style.borderColor;
  el.style.borderColor = '#4C7A62';
  setTimeout(()=>{ el.style.borderColor = old; }, 500);
}

document.getElementById('tmplText').addEventListener('input', (e)=>{
  saveTemplateText(currentTemplateKey, e.target.value);
  updatePreview();
});
['v_name','v_role','v_company','v_sourcer','v_details'].forEach(id=>{
  document.getElementById(id).addEventListener('input', updatePreview);
});

// Init
(async function init(){
  await loadTemplates();
  renderTmplButtons('tmplButtons', currentTemplateKey, selectTemplateSingle);
  document.getElementById('tmplText').value = templates[currentTemplateKey].text;
  updatePreview();
})();
</script>
</body>
</html>
